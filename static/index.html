<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MemoLens</title>
    <style>
      :root {
        --bg: #f0eadf;
        --panel: rgba(255, 250, 241, 0.9);
        --surface: rgba(255, 255, 255, 0.78);
        --ink: #1d1c1a;
        --muted: #6f675d;
        --line: rgba(29, 28, 26, 0.14);
        --accent: #0f766e;
        --accent-2: #d97706;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", "Noto Serif SC", serif;
        background:
          radial-gradient(circle at top left, rgba(217, 119, 6, 0.16), transparent 30%),
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.16), transparent 28%),
          linear-gradient(180deg, #f7f2e8 0%, #efe7d7 100%);
      }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 28px 18px 56px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 6px 0 0;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 0.95;
      }

      .subtitle {
        margin: 10px 0 0;
        max-width: 760px;
        color: var(--muted);
      }

      .nav-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        text-decoration: none;
      }

      .layout {
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        min-width: 0;
        padding: 18px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 12px 40px rgba(68, 54, 38, 0.08);
        backdrop-filter: blur(12px);
      }

      .sidebar-panel {
        align-self: start;
      }

      .section-title {
        margin: 0 0 12px;
        font-size: 0.92rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      label {
        display: block;
        font-size: 0.92rem;
      }

      input[type="text"] {
        width: 100%;
        margin-top: 6px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        font: inherit;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .row > * {
        min-width: 0;
      }

      .checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      button {
        width: 100%;
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent) 0%, #115e59 100%);
        color: white;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .status {
        min-height: 20px;
        color: var(--muted);
      }

      .summary {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .directory-list {
        display: grid;
        gap: 8px;
      }

      .directory-chip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
      }

      .directory-chip strong {
        color: var(--ink);
      }

      .directory-chip button {
        width: auto;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .card {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .card-link {
        display: block;
        color: inherit;
        text-decoration: none;
      }

      .card img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
        background: rgba(255, 255, 255, 0.42);
      }

      .card-body {
        padding: 12px;
        display: grid;
        gap: 6px;
      }

      .card-title {
        font-size: 0.95rem;
        word-break: break-word;
      }

      .meta {
        color: var(--muted);
        font-size: 0.82rem;
        word-break: break-word;
      }

      .empty {
        padding: 42px 18px;
        border-radius: 18px;
        border: 1px dashed var(--line);
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.42);
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <div class="eyebrow">MemoLens</div>
          <h1>相册首页</h1>
          <p class="subtitle">选择一个或多个本地相册目录后，页面会直接列出其中的照片。默认不递归扫描子目录；原来的单张推理页已移动到调试页。</p>
        </div>
        <div class="nav-row">
          <a class="nav-link" href="/debug">进入调试页</a>
          <a class="nav-link" href="/people">人物 ID 管理</a>
        </div>
      </section>

      <section class="layout">
        <aside class="panel stack sidebar-panel">
          <div>
            <h2 class="section-title">读取目录</h2>
            <div class="row">
              <button id="add-directory" class="secondary" type="button">添加目录</button>
              <button id="scan" type="button">读取照片</button>
            </div>
            <div class="meta" style="margin-top: 10px;">
              可重复添加多个目录；默认不递归扫描子目录。
            </div>
          </div>

          <div class="row">
            <label class="checkbox">
              <input id="recursive" type="checkbox" />
              递归扫描子目录
            </label>
          </div>

          <div>
            <h2 class="section-title">已选目录</h2>
            <div id="directories" class="directory-list empty">还没有选择目录。</div>
          </div>

          <div id="status" class="status">先添加一个目录。</div>

          <div class="summary">
            <div id="summary-directory">目录数：0</div>
            <div id="summary-count">照片数：-</div>
          </div>
        </aside>

        <section class="panel">
          <h2 class="section-title">照片列表</h2>
          <div id="results" class="empty">输入目录后，这里会显示所有照片。</div>
        </section>
      </section>
    </main>

    <script>
      const addDirectoryButton = document.getElementById("add-directory");
      const recursiveInput = document.getElementById("recursive");
      const scanButton = document.getElementById("scan");
      const directoriesNode = document.getElementById("directories");
      const statusNode = document.getElementById("status");
      const summaryDirectoryNode = document.getElementById("summary-directory");
      const summaryCountNode = document.getElementById("summary-count");
      const resultsNode = document.getElementById("results");
      const selectedDirectories = [];
      const STORAGE_KEY = "memolens.library.directories";
      const RECURSIVE_STORAGE_KEY = "memolens.library.recursive";

      function formatBytes(value) {
        if (!value) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        let size = value;
        let index = 0;
        while (size >= 1024 && index < units.length - 1) {
          size /= 1024;
          index += 1;
        }
        return `${size.toFixed(size >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
      }

      function formatTime(timestamp) {
        if (!timestamp) return "-";
        return new Date(timestamp * 1000).toLocaleString("zh-CN", { hour12: false });
      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function persistDirectories() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedDirectories));
        } catch (_error) {
          // Ignore localStorage failures.
        }
      }

      function persistRecursiveOption() {
        try {
          localStorage.setItem(RECURSIVE_STORAGE_KEY, recursiveInput.checked ? "1" : "0");
        } catch (_error) {
          // Ignore localStorage failures.
        }
      }

      function restoreStoredState() {
        try {
          const storedDirectories = localStorage.getItem(STORAGE_KEY);
          if (storedDirectories) {
            const parsed = JSON.parse(storedDirectories);
            if (Array.isArray(parsed)) {
              parsed.forEach((item) => {
                if (!item || typeof item.path !== "string") {
                  return;
                }
                selectedDirectories.push({
                  id: item.path,
                  path: item.path,
                  name: item.name || item.path.replace(/\/$/, "").split("/").pop() || item.path,
                });
              });
            }
          }
          recursiveInput.checked = localStorage.getItem(RECURSIVE_STORAGE_KEY) === "1";
        } catch (_error) {
          // Ignore broken localStorage payloads.
        }
      }

      function renderDirectories() {
        if (!selectedDirectories.length) {
          directoriesNode.className = "directory-list empty";
          directoriesNode.textContent = "还没有选择目录。";
          summaryDirectoryNode.textContent = "目录数：0";
          summaryCountNode.textContent = "照片数：-";
          statusNode.textContent = "先添加一个目录。";
          resultsNode.className = "empty";
          resultsNode.textContent = "输入目录后，这里会显示所有照片。";
          return;
        }
        directoriesNode.className = "directory-list";
        directoriesNode.innerHTML = selectedDirectories.map((item) => `
          <div class="directory-chip">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <div class="meta">${escapeHtml(item.path)}</div>
            </div>
            <button type="button" data-remove-dir="${item.id}">移除</button>
          </div>
        `).join("");
        summaryDirectoryNode.textContent = `目录数：${selectedDirectories.length}`;
        directoriesNode.querySelectorAll("[data-remove-dir]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.removeDir;
            const index = selectedDirectories.findIndex((item) => item.id === id);
            if (index >= 0) {
              selectedDirectories.splice(index, 1);
              persistDirectories();
              renderDirectories();
            }
          });
        });
      }

      function addDirectories(paths) {
        if (!paths.length) {
          statusNode.textContent = "没有选择目录。";
          return;
        }
        let addedCount = 0;
        paths.forEach((path) => {
          if (!path) {
            return;
          }
          if (selectedDirectories.some((item) => item.path === path)) {
            return;
          }
          const parts = path.replace(/\/$/, "").split("/");
          selectedDirectories.push({
            id: path,
            path,
            name: parts[parts.length - 1] || path,
          });
          addedCount += 1;
        });
        persistDirectories();
        renderDirectories();
        statusNode.textContent = addedCount
          ? `已添加 ${addedCount} 个目录。`
          : "这些目录已经在列表里了。";
      }

      function renderFiles(files) {
        if (!files.length) {
          resultsNode.className = "empty";
          resultsNode.textContent = "这个目录里没有找到支持的照片文件。";
          return;
        }
        resultsNode.className = "grid";
        resultsNode.innerHTML = files.map((file) => {
          const url = `/api/library/image?path=${encodeURIComponent(file.path)}`;
          const debugUrl = `/debug?image_path=${encodeURIComponent(file.path)}&auto_start=1`;
          return `
          <article class="card">
            <a class="card-link" href="${debugUrl}">
              <img src="${url}" alt="" loading="lazy" />
              <div class="card-body">
                <div class="card-title">${escapeHtml(file.name)}</div>
                <div class="meta">${escapeHtml(file.display_path || file.relative_path)}</div>
                <div class="meta">${formatBytes(file.size_bytes)} · ${formatTime(file.modified_at)}</div>
              </div>
            </a>
          </article>
        `;
        }).join("");
      }

      async function scanDirectories() {
        if (!selectedDirectories.length) {
          statusNode.textContent = "先添加至少一个目录。";
          return;
        }
        scanButton.disabled = true;
        addDirectoryButton.disabled = true;
        statusNode.textContent = "正在读取目录...";
        try {
          const response = await fetch("/api/library/scan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              directories: selectedDirectories.map((item) => item.path),
              recursive: recursiveInput.checked,
            }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "读取失败");
          }
          summaryCountNode.textContent = `照片数：${payload.count}`;
          if (!payload.count && Array.isArray(payload.hints) && payload.hints.length) {
            statusNode.textContent = `读取完成，共找到 0 张照片。${payload.hints.join(" ")}`;
          } else {
            statusNode.textContent = `读取完成，共找到 ${payload.count} 张照片。`;
          }
          renderFiles(payload.files || []);
        } catch (error) {
          statusNode.textContent = `读取失败: ${error.message}`;
          resultsNode.className = "empty";
          resultsNode.textContent = "读取失败。";
        } finally {
          scanButton.disabled = false;
          addDirectoryButton.disabled = false;
        }
      }

      async function addDirectory() {
        addDirectoryButton.disabled = true;
        scanButton.disabled = true;
        statusNode.textContent = "正在打开目录选择器...";
        try {
          const response = await fetch("/api/library/pick-directories", { method: "POST" });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "打开目录选择器失败");
          }
          addDirectories(payload.directories || []);
        } catch (error) {
          statusNode.textContent = `打开目录选择器失败: ${error.message}`;
        } finally {
          addDirectoryButton.disabled = false;
          scanButton.disabled = false;
        }
      }

      addDirectoryButton.addEventListener("click", addDirectory);
      recursiveInput.addEventListener("change", persistRecursiveOption);
      scanButton.addEventListener("click", scanDirectories);
      restoreStoredState();
      renderDirectories();
      if (selectedDirectories.length) {
        statusNode.textContent = `已恢复 ${selectedDirectories.length} 个目录。`;
      }
    </script>
  </body>
</html>
